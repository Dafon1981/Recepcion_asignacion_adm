<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación de Trabajo - Auditoría</title>
    
    <!-- Bibliotecas -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5 ); }
        
        /* Navegación de Fecha */
        .date-nav { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; background: #2a2a2a; padding: 15px; border-radius: 8px; }
        .date-nav button { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .date-nav button:hover { background: #2980b9; }
        .date-nav input[type="date"] { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; font-size: 16px; }
        .btn-save-global { background: #2ecc71 !important; }
        .btn-save-global:hover { background: #27ae60 !important; }

        /* Pestañas */
        .tabs { display: flex; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .tab { padding: 12px 20px; cursor: pointer; font-weight: bold; color: #888; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab.active { color: #f1c40f; border-bottom-color: #f1c40f; }
        .tab:hover:not(.active) { color: #ddd; }

        /* Contenido */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Gráfico y Tabla */
        .chart-container { width: 100%; max-width: 800px; margin: 0 auto 30px auto; background: #252525; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #252525; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; vertical-align: middle; }
        th { background: #333; color: #f1c40f; }
        tr:hover { background: #2a2a2a; }

        /* Inputs dentro de la tabla */
        td input[type="text"], td input[type="number"] {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #1a1a1a;
            color: white;
            outline: none;
        }
        td input[type="text"]:focus, td input[type="number"]:focus { border-color: #f1c40f; }
        .btn-save-row { background: #f39c12; color: #000; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-save-row:hover { background: #d35400; color: white; }
        .fecha-badge { background: #444; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; color: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <!-- Navegación de Fechas (Basado en fecha_creacion) -->
    <div class="date-nav">
        <button onclick="changeDate(-1)">◀ Día Anterior</button>
        <input type="date" id="current-date" onchange="loadData()">
        <button onclick="changeDate(1)">Día Siguiente ▶</button>
        <button class="btn-save-global" id="btn-global-save" onclick="saveAuditDate()">💾 Guardar Fecha en Asignación</button>
    </div>

    <!-- Pestañas -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('consumo')">Digitadores con consumo</div>
        <div class="tab" onclick="switchTab('sin-consumo')">Digitadores sin consumo</div>
    </div>

    <!-- Pestaña: Con Consumo (Con Inputs y Botones) -->
    <div id="consumo" class="tab-content active">
        <div class="chart-container">
            <canvas id="chartConsumo"></canvas>
        </div>
        <h3>Detalles de Asignación (Con Consumo)</h3>
        <table>
            <thead>
                <tr>
                    <th>Digitador</th>
                    <th>Composición Armado</th>
                    <th style="width: 150px;">Cant. Pre-Asignación</th>
                    <th>Fecha Asignada</th>
                    <th style="width: 100px;">Acción</th>
                </tr>
            </thead>
            <tbody id="table-consumo">
                <!-- Datos dinámicos -->
            </tbody>
        </table>
    </div>

    <!-- Pestaña: Sin Consumo (Solo Lectura) -->
    <div id="sin-consumo" class="tab-content">
        <div class="chart-container">
            <canvas id="chartSinConsumo"></canvas>
        </div>
        <h3>Detalles de Asignación (Sin Consumo)</h3>
        <table>
            <thead>
                <tr>
                    <th>Digitador</th>
                    <th>Composición Armado</th>
                    <th style="width: 150px;">Cant. Pre-Asignación</th>
                    <th>Fecha Asignada</th>
                </tr>
            </thead>
            <tbody id="table-sin-consumo">
                <!-- Datos dinámicos -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // Configuración de Supabase
    const SUPABASE_URL = 'https://esiklpxyectbekxvajnw.supabase.co';
    const SUPABASE_ANON_KEY = 'TU_ANON_KEY_AQUI'; // <-- Asegúrate de poner tu clave aquí
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY );

    let currentTab = 'consumo';
    let chartConsumoInstance = null;
    let chartSinConsumoInstance = null;
    const digitadores = ['Renzo', 'Ze carlos', 'Stefanny', 'Jelitza', 'Joseph', 'Noemi'];

    // Inicializar fecha actual
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('current-date').value = today;
        initCharts();
        loadData();
    });

    // Cambiar Pestañas
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        currentTab = tabId;
        
        // Ocultar el botón global de guardar en la pestaña sin consumo si lo deseas
        document.getElementById('btn-global-save').style.display = tabId === 'consumo' ? 'inline-block' : 'none';
        
        loadData();
    }

    // Navegación de días
    function changeDate(days) {
        const dateInput = document.getElementById('current-date');
        const currentDate = new Date(dateInput.value);
        currentDate.setDate(currentDate.getDate() + days);
        dateInput.value = currentDate.toISOString().split('T')[0];
        loadData();
    }

    // Inicializar Gráficos vacíos
    function initCharts() {
        const ctxConsumo = document.getElementById('chartConsumo').getContext('2d');
        const ctxSinConsumo = document.getElementById('chartSinConsumo').getContext('2d');
        
        const config = {
            type: 'bar',
            data: { labels: digitadores, datasets: [{ label: 'Cantidad de Registros', data: [0,0,0,0,0,0], backgroundColor: '#3498db' }] },
            options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } }, plugins: { legend: { labels: { color: '#fff' } } } }
        };

        chartConsumoInstance = new Chart(ctxConsumo, JSON.parse(JSON.stringify(config)));
        config.data.datasets[0].backgroundColor = '#e74c3c'; 
        chartSinConsumoInstance = new Chart(ctxSinConsumo, config);
    }

    // Cargar Datos desde Supabase (Filtrando por fecha_creacion)
    async function loadData() {
        const selectedDate = document.getElementById('current-date').value;
        if (!selectedDate) return;

        try {
            // Filtramos por fecha_creacion usando un rango para abarcar todo el día
            const { data, error } = await supabase
                .from('registros')
                .select(`
                    id, Resp_Aud_Digi, fecha_creacion,
                    asignacion ( id, FechaAuditoriaDigitadores, FechaAuditoriaSinConsumo, CantidadPreAsignacion, ComposicionArmado )
                `)
                .gte('fecha_creacion', `${selectedDate}T00:00:00`)
                .lte('fecha_creacion', `${selectedDate}T23:59:59`);

            if (error) throw error;

            // Agrupar por digitador
            const counts = {};
            const asigData = {};
            digitadores.forEach(d => { counts[d] = 0; asigData[d] = { comp: '', cant: 0, fecha: '' }; });

            data.forEach(row => {
                const digi = row.Resp_Aud_Digi;
                if (digitadores.includes(digi)) {
                    counts[digi]++;
                    if (row.asignacion && row.asignacion.length > 0) {
                        if(row.asignacion[0].ComposicionArmado) asigData[digi].comp = row.asignacion[0].ComposicionArmado;
                        if(row.asignacion[0].CantidadPreAsignacion) asigData[digi].cant = row.asignacion[0].CantidadPreAsignacion;
                        
                        const fechaGuardada = currentTab === 'consumo' ? row.asignacion[0].FechaAuditoriaDigitadores : row.asignacion[0].FechaAuditoriaSinConsumo;
                        if(fechaGuardada) asigData[digi].fecha = fechaGuardada;
                    }
                }
            });

            // Generar HTML de la tabla dependiendo de la pestaña
            let tableHTML = '';
            digitadores.forEach((digi, index) => {
                if (counts[digi] > 0) {
                    const fechaDisplay = asigData[digi].fecha ? `<span class="fecha-badge">${asigData[digi].fecha}</span>` : '<span style="color:#777;">Sin asignar</span>';
                    
                    if (currentTab === 'consumo') {
                        // Con inputs y botón
                        tableHTML += `
                        <tr>
                            <td><strong>${digi}</strong> <span style="color:#aaa; font-size:0.85em;">(${counts[digi]} reg)</span></td>
                            <td><input type="text" id="comp-${currentTab}-${index}" value="${asigData[digi].comp}" placeholder="Ej: Armado A"></td>
                            <td><input type="number" id="cant-${currentTab}-${index}" value="${asigData[digi].cant}" min="0"></td>
                            <td>${fechaDisplay}</td>
                            <td><button class="btn-save-row" onclick="saveRowData('${digi}', 'comp-${currentTab}-${index}', 'cant-${currentTab}-${index}')">Guardar</button></td>
                        </tr>`;
                    } else {
                        // Solo lectura
                        tableHTML += `
                        <tr>
                            <td><strong>${digi}</strong> <span style="color:#aaa; font-size:0.85em;">(${counts[digi]} reg)</span></td>
                            <td>${asigData[digi].comp || '-'}</td>
                            <td>${asigData[digi].cant || '0'}</td>
                            <td>${fechaDisplay}</td>
                        </tr>`;
                    }
                }
            });

            if(tableHTML === '') {
                const colSpan = currentTab === 'consumo' ? 5 : 4;
                tableHTML = `<tr><td colspan="${colSpan}" style="text-align:center;">No hay registros creados en esta fecha</td></tr>`;
            }

            // Actualizar Gráfico y Tabla
            const chartData = digitadores.map(d => counts[d]);
            if (currentTab === 'consumo') {
                chartConsumoInstance.data.datasets[0].data = chartData;
                chartConsumoInstance.update();
                document.getElementById('table-consumo').innerHTML = tableHTML;
            } else {
                chartSinConsumoInstance.data.datasets[0].data = chartData;
                chartSinConsumoInstance.update();
                document.getElementById('table-sin-consumo').innerHTML = tableHTML;
            }

        } catch (err) {
            console.error("Error cargando datos:", err);
        }
    }

    // Guardar datos de una fila específica (Solo disponible en 'consumo')
    async function saveRowData(digitador, compId, cantId) {
        const compValue = document.getElementById(compId).value;
        const cantValue = document.getElementById(cantId).value;
        const selectedDate = document.getElementById('current-date').value;

        try {
            // Buscar registros creados en esa fecha para ese digitador
            const { data: registros } = await supabase
                .from('registros')
                .select('id')
                .gte('fecha_creacion', `${selectedDate}T00:00:00`)
                .lte('fecha_creacion', `${selectedDate}T23:59:59`)
                .eq('Resp_Aud_Digi', digitador);

            if (!registros || registros.length === 0) return alert("No se encontraron registros para actualizar.");
            const registroIds = registros.map(r => r.id);

            const { data: existingAsig } = await supabase
                .from('asignacion')
                .select('id, registro_id')
                .in('registro_id', registroIds);

            const existingMap = {};
            if (existingAsig) existingAsig.forEach(a => existingMap[a.registro_id] = a.id);

            const upsertData = registroIds.map(rid => {
                const payload = {
                    registro_id: rid,
                    ComposicionArmado: compValue,
                    CantidadPreAsignacion: cantValue || 0
                };
                if (existingMap[rid]) payload.id = existingMap[rid]; 
                return payload;
            });

            const { error } = await supabase.from('asignacion').upsert(upsertData);
            if (error) throw error;

            alert(`✅ Datos guardados correctamente para ${digitador}`);
            loadData(); 
        } catch (err) {
            alert("Error al guardar: " + err.message);
        }
    }

    // Guardar la fecha global en la tabla asignacion
    async function saveAuditDate() {
        const selectedDate = document.getElementById('current-date').value;
        if (!selectedDate) return alert("Selecciona una fecha primero.");

        const fieldToUpdate = currentTab === 'consumo' ? 'FechaAuditoriaDigitadores' : 'FechaAuditoriaSinConsumo';

        try {
            const { data: registros } = await supabase
                .from('registros')
                .select('id')
                .gte('fecha_creacion', `${selectedDate}T00:00:00`)
                .lte('fecha_creacion', `${selectedDate}T23:59:59`);
                
            if (!registros || registros.length === 0) return alert("No hay registros creados en esta fecha para actualizar.");

            const registroIds = registros.map(r => r.id);

            const { data: existingAsig } = await supabase.from('asignacion').select('id, registro_id').in('registro_id', registroIds);
            const existingMap = {};
            if (existingAsig) existingAsig.forEach(a => existingMap[a.registro_id] = a.id);

            const upsertData = registroIds.map(rid => {
                const payload = { registro_id: rid, [fieldToUpdate]: selectedDate };
                if (existingMap[rid]) payload.id = existingMap[rid];
                return payload;
            });

            const { error } = await supabase.from('asignacion').upsert(upsertData);
            if (error) throw error;

            alert(`✅ Fecha guardada correctamente en ${fieldToUpdate}.`);
            loadData(); 
        } catch (err) {
            alert("Error al guardar la fecha: " + err.message);
        }
    }
</script>
</body>
</html>
