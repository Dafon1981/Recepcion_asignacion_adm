<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación de Trabajo - Auditoría</title>
    
    <!-- Bibliotecas -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5 ); }
        
        /* Navegación de Fecha */
        .date-nav { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; background: #2a2a2a; padding: 15px; border-radius: 8px; }
        .date-nav button { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .date-nav button:hover { background: #2980b9; }
        .date-nav input[type="date"] { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; font-size: 16px; }
        .btn-save { background: #2ecc71 !important; }
        .btn-save:hover { background: #27ae60 !important; }

        /* Pestañas */
        .tabs { display: flex; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .tab { padding: 12px 20px; cursor: pointer; font-weight: bold; color: #888; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab.active { color: #f1c40f; border-bottom-color: #f1c40f; }
        .tab:hover:not(.active) { color: #ddd; }

        /* Contenido */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Gráfico y Tabla */
        .chart-container { width: 100%; max-width: 800px; margin: 0 auto 30px auto; background: #252525; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #252525; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
        th { background: #333; color: #f1c40f; }
        tr:hover { background: #2a2a2a; }
    </style>
</head>
<body>

<div class="container">
    <!-- Navegación de Fechas y Título Editable -->
    <div class="date-nav">
        <button onclick="changeDate(-1)">◀ Día Anterior</button>
        <input type="date" id="current-date" onchange="loadData()">
        <button onclick="changeDate(1)">Día Siguiente ▶</button>
        <button class="btn-save" onclick="saveAuditDate()">💾 Guardar Fecha en Asignación</button>
    </div>

    <!-- Pestañas -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('consumo')">Digitadores con consumo</div>
        <div class="tab" onclick="switchTab('sin-consumo')">Digitadores sin consumo</div>
    </div>

    <!-- Pestaña: Con Consumo -->
    <div id="consumo" class="tab-content active">
        <div class="chart-container">
            <canvas id="chartConsumo"></canvas>
        </div>
        <h3>Detalles de Asignación (Con Consumo)</h3>
        <table>
            <thead>
                <tr>
                    <th>Digitador</th>
                    <th>Composición Armado</th>
                    <th>Cantidad Pre-Asignación</th>
                </tr>
            </thead>
            <tbody id="table-consumo">
                <!-- Datos dinámicos -->
            </tbody>
        </table>
    </div>

    <!-- Pestaña: Sin Consumo -->
    <div id="sin-consumo" class="tab-content">
        <div class="chart-container">
            <canvas id="chartSinConsumo"></canvas>
        </div>
        <h3>Detalles de Asignación (Sin Consumo)</h3>
        <table>
            <thead>
                <tr>
                    <th>Digitador</th>
                    <th>Composición Armado</th>
                    <th>Cantidad Pre-Asignación</th>
                </tr>
            </thead>
            <tbody id="table-sin-consumo">
                <!-- Datos dinámicos -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // Configuración de Supabase
    const SUPABASE_URL = 'https://esiklpxyectbekxvajnw.supabase.co';
    const SUPABASE_ANON_KEY = 'TU_ANON_KEY_AQUI'; // <-- Asegúrate de poner tu clave aquí
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY );

    let currentTab = 'consumo';
    let chartConsumoInstance = null;
    let chartSinConsumoInstance = null;
    const digitadores = ['Renzo', 'Ze carlos', 'Stefanny', 'Jelitza', 'Joseph', 'Noemi'];

    // Inicializar fecha actual
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('current-date').value = today;
        initCharts();
        loadData();
    });

    // Cambiar Pestañas
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        currentTab = tabId;
        loadData();
    }

    // Navegación de días
    function changeDate(days) {
        const dateInput = document.getElementById('current-date');
        const currentDate = new Date(dateInput.value);
        currentDate.setDate(currentDate.getDate() + days);
        dateInput.value = currentDate.toISOString().split('T')[0];
        loadData();
    }

    // Inicializar Gráficos vacíos
    function initCharts() {
        const ctxConsumo = document.getElementById('chartConsumo').getContext('2d');
        const ctxSinConsumo = document.getElementById('chartSinConsumo').getContext('2d');
        
        const config = {
            type: 'bar',
            data: { labels: digitadores, datasets: [{ label: 'Cantidad de Registros', data: [0,0,0,0,0,0], backgroundColor: '#3498db' }] },
            options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } }, plugins: { legend: { labels: { color: '#fff' } } } }
        };

        chartConsumoInstance = new Chart(ctxConsumo, JSON.parse(JSON.stringify(config)));
        config.data.datasets[0].backgroundColor = '#e74c3c'; // Color diferente para sin consumo
        chartSinConsumoInstance = new Chart(ctxSinConsumo, config);
    }

    // Cargar Datos desde Supabase
    async function loadData() {
        const selectedDate = document.getElementById('current-date').value;
        if (!selectedDate) return;

        try {
            // Consultar registros unidos con asignacion filtrando por la fecha seleccionada
            // Asumimos que filtramos por FechaAuditoria de la tabla registros
            const { data, error } = await supabase
                .from('registros')
                .select(`
                    id, Resp_Aud_Digi, FechaAuditoria,
                    asignacion ( id, FechaAuditoriaDigitadores, FechaAuditoriaSinConsumo, CantidadPreAsignacion, ComposicionArmado )
                `)
                .eq('FechaAuditoria', selectedDate);

            if (error) throw error;

            // Procesar datos para el gráfico y la tabla
            const counts = { 'Renzo': 0, 'Ze carlos': 0, 'Stefanny': 0, 'Jelitza': 0, 'Joseph': 0, 'Noemi': 0 };
            let tableHTML = '';

            data.forEach(row => {
                const digi = row.Resp_Aud_Digi;
                if (counts[digi] !== undefined) counts[digi]++;

                // Extraer datos de asignación (si existen)
                const asig = row.asignacion && row.asignacion.length > 0 ? row.asignacion[0] : {};
                const comp = asig.ComposicionArmado || '-';
                const cant = asig.CantidadPreAsignacion || 0;

                tableHTML += `<tr><td>${digi || 'Sin asignar'}</td><td>${comp}</td><td>${cant}</td></tr>`;
            });

            // Actualizar Gráfico correspondiente
            const chartData = digitadores.map(d => counts[d]);
            if (currentTab === 'consumo') {
                chartConsumoInstance.data.datasets[0].data = chartData;
                chartConsumoInstance.update();
                document.getElementById('table-consumo').innerHTML = tableHTML || '<tr><td colspan="3">No hay datos para esta fecha</td></tr>';
            } else {
                chartSinConsumoInstance.data.datasets[0].data = chartData;
                chartSinConsumoInstance.update();
                document.getElementById('table-sin-consumo').innerHTML = tableHTML || '<tr><td colspan="3">No hay datos para esta fecha</td></tr>';
            }

        } catch (err) {
            console.error("Error cargando datos:", err);
        }
    }

    // Guardar la fecha editable en la tabla asignacion
    async function saveAuditDate() {
        const selectedDate = document.getElementById('current-date').value;
        if (!selectedDate) return alert("Selecciona una fecha primero.");

        const fieldToUpdate = currentTab === 'consumo' ? 'FechaAuditoriaDigitadores' : 'FechaAuditoriaSinConsumo';

        try {
            // 1. Obtener los IDs de los registros de esa fecha
            const { data: registros } = await supabase.from('registros').select('id').eq('FechaAuditoria', selectedDate);
            if (!registros || registros.length === 0) return alert("No hay registros en esta fecha para actualizar.");

            const registroIds = registros.map(r => r.id);

            // 2. Actualizar la tabla asignacion para esos IDs
            const { error } = await supabase
                .from('asignacion')
                .update({ [fieldToUpdate]: selectedDate })
                .in('registro_id', registroIds);

            if (error) throw error;
            alert(`Fecha guardada correctamente en ${fieldToUpdate} para ${registroIds.length} registros.`);
            loadData();

        } catch (err) {
            alert("Error al guardar: " + err.message);
        }
    }
</script>
</body>
</html>
