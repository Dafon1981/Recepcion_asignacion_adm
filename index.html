<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación de Trabajo - Auditoría</title>
    
    <!-- Bibliotecas -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5 ); }
        
        /* Header / Navegación */
        .header-nav { display: flex; justify-content: space-between; align-items: center; background: #2a2a2a; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
        .nav-left, .nav-right { display: flex; gap: 10px; align-items: center; }
        .nav-center { text-align: center; flex-grow: 1; }
        
        .header-nav button { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 15px; }
        .header-nav button:hover { background: #2980b9; }
        
        /* Fecha Grande al Centro */
        .big-date { font-size: 26px; font-weight: bold; padding: 10px 20px; border-radius: 8px; border: 2px solid #555; background: #111; color: #f1c40f; text-align: center; outline: none; cursor: pointer; }
        .big-date:focus { border-color: #f1c40f; }

        /* Pestañas */
        .tabs { display: flex; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .tab { padding: 12px 20px; cursor: pointer; font-weight: bold; color: #888; border-bottom: 3px solid transparent; transition: 0.3s; font-size: 16px; }
        .tab.active { color: #f1c40f; border-bottom-color: #f1c40f; }
        .tab:hover:not(.active) { color: #ddd; }

        /* Contenido */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Subtítulo con Input de Fecha */
        .tab-subtitle { display: flex; justify-content: center; align-items: center; gap: 15px; color: #aaa; margin-bottom: 20px; font-size: 16px; background: #252525; padding: 15px; border-radius: 5px; }
        .tab-subtitle input[type="date"] { padding: 8px; border-radius: 5px; border: 1px solid #555; background: #1a1a1a; color: #2ecc71; font-weight: bold; outline: none; font-size: 15px; }
        .btn-save-audit { background: #2ecc71; color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-save-audit:hover { background: #27ae60; color: white; }
        
        /* Panel Global de Composición */
        .global-panel { display: flex; align-items: center; gap: 15px; background: #252525; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #f39c12; }
        .global-panel .input-group { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; }
        .global-panel label { font-size: 14px; color: #ccc; font-weight: bold; }
        .global-panel input { padding: 10px; border-radius: 5px; border: 1px solid #555; background: #1a1a1a; color: white; outline: none; font-size: 15px; }
        .global-panel input:focus { border-color: #f1c40f; }
        .btn-save-panel { background: #f39c12; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 15px; height: 42px; margin-top: 22px; }
        .btn-save-panel:hover { background: #d35400; color: white; }

        /* Gráfico y Tabla */
        .chart-container { width: 100%; max-width: 900px; margin: 30px auto 0 auto; background: #252525; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #252525; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; vertical-align: middle; }
        th { background: #333; color: #f1c40f; }
        tr { transition: background-color 0.3s; }
        tr:hover { background: #2a2a2a; }
        .reg-count { color: #3498db; font-weight: bold; font-size: 1.1em; }
        
        /* Estilos para el Checkbox y fila verde */
        .check-cell { width: 50px; text-align: center; }
        .digitador-check { transform: scale(1.5); cursor: pointer; accent-color: #2ecc71; }
        .row-checked { background-color: rgba(46, 204, 113, 0.15) !important; border-left: 4px solid #2ecc71; }
    </style>
</head>
<body>

<div class="container">
    <!-- Navegación Superior -->
    <div class="header-nav">
        <div class="nav-left">
            <button onclick="changeDate(-1)">◀ Día Anterior</button>
        </div>
        <div class="nav-center">
            <input type="date" id="current-date" class="big-date" onchange="manualDateChange()">
        </div>
        <div class="nav-right">
            <button onclick="changeDate(1)">Día Siguiente ▶</button>
        </div>
    </div>

    <!-- Pestañas -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('consumo')">Digitadores con consumo</div>
        <div class="tab" onclick="switchTab('sin-consumo')">Digitadores sin consumo</div>
    </div>

    <!-- Pestaña: Con Consumo -->
    <div id="consumo" class="tab-content active">
        <div class="tab-subtitle">
            <label>FechaAuditoriaDigitadores:</label>
            <input type="date" id="audit-date-consumo">
            <button class="btn-save-audit" onclick="saveAuditDateSpecific('consumo')">Guardar Fecha</button>
        </div>
        
        <!-- PANEL ÚNICO DE COMPOSICIÓN -->
        <div class="global-panel">
            <div class="input-group">
                <label>Composición Armado Global</label>
                <input type="text" id="global-comp" placeholder="Ej: Armado A">
            </div>
            <div class="input-group" style="max-width: 200px;">
                <label>Cant. Pre-Asignación</label>
                <input type="number" id="global-cant" min="0" value="0">
            </div>
            <button class="btn-save-panel" onclick="saveGlobalComposition()">Guardar Datos</button>
        </div>

        <!-- TABLA LIMPIA CON CHECKS -->
        <table>
            <thead>
                <tr>
                    <th class="check-cell">✓</th>
                    <th>Digitador</th>
                    <th style="width: 200px; text-align: center;">Registros del Día</th>
                </tr>
            </thead>
            <tbody id="table-consumo">
                <!-- Datos dinámicos -->
            </tbody>
        </table>

        <div class="chart-container">
            <canvas id="chartConsumo"></canvas>
        </div>
    </div>

    <!-- Pestaña: Sin Consumo -->
    <div id="sin-consumo" class="tab-content">
        <div class="tab-subtitle">
            <label>FechaAuditoriaSinConsumo:</label>
            <input type="date" id="audit-date-sin-consumo">
            <button class="btn-save-audit" onclick="saveAuditDateSpecific('sin-consumo')">Guardar Fecha</button>
        </div>
        
        <!-- TABLA LIMPIA CON CHECKS -->
        <table>
            <thead>
                <tr>
                    <th class="check-cell">✓</th>
                    <th>Digitador</th>
                    <th style="width: 200px; text-align: center;">Registros del Día</th>
                </tr>
            </thead>
            <tbody id="table-sin-consumo">
                <!-- Datos dinámicos -->
            </tbody>
        </table>

        <div class="chart-container">
            <canvas id="chartSinConsumo"></canvas>
        </div>
    </div>
</div>
<script>
    // Configuración de Supabase
    const supabaseUrl = 'https://esiklpxyectbekxvajnw.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzaWtscHh5ZWN0YmVreHZham53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2OTI1MjEsImV4cCI6MjA3NzI2ODUyMX0.mtQnqUrTmhmN1DQxOAUnGpizhYZobStHDH0cz_XfKGU';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey );

    Chart.register(ChartDataLabels);

    let currentTab = 'consumo';
    let chartConsumoInstance = null;
    let chartSinConsumoInstance = null;
    
    let digitadoresConConsumo = [];
    let digitadoresSinConsumo = [];
    let pollingTimer = null;

    document.addEventListener('DOMContentLoaded', async () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('current-date').value = today;
        
        await cargarDigitadores();
        initCharts();
        await loadData();
        iniciarTemporizador();
    });

    async function cargarDigitadores() {
        const { data } = await supabase.from('digitadores').select('*');
        if (data) {
            digitadoresConConsumo = data.filter(d => d.condicion === 'con consumo').map(d => d.nombre);
            digitadoresSinConsumo = data.filter(d => d.condicion === 'sin consumo').map(d => d.nombre);
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        currentTab = tabId;
        loadData();
    }

    function changeDate(days) {
        const dateInput = document.getElementById('current-date');
        const currentDate = new Date(dateInput.value);
        currentDate.setDate(currentDate.getDate() + days);
        dateInput.value = currentDate.toISOString().split('T')[0];
        manualDateChange();
    }

    function manualDateChange() { loadData(); iniciarTemporizador(); }

    function iniciarTemporizador() {
        if (pollingTimer) clearInterval(pollingTimer);
        pollingTimer = setInterval(() => {
            if (document.activeElement.tagName !== 'INPUT') loadData();
        }, 10000);
    }

    function initCharts() {
        const ctxConsumo = document.getElementById('chartConsumo').getContext('2d');
        const ctxSinConsumo = document.getElementById('chartSinConsumo').getContext('2d');
        
        const configBase = { 
            type: 'bar', 
            options: { 
                responsive: true, 
                scales: { y: { beginAtZero: true, ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } }, 
                plugins: { 
                    legend: { display: false },
                    datalabels: { color: '#fff', anchor: 'end', align: 'top', font: { weight: 'bold', size: 14 } }
                } 
            } 
        };
        
        chartConsumoInstance = new Chart(ctxConsumo, { ...configBase, data: { labels: digitadoresConConsumo, datasets: [{ data: [], backgroundColor: '#3498db', borderRadius: 4 }] } });
        chartSinConsumoInstance = new Chart(ctxSinConsumo, { ...configBase, data: { labels: digitadoresSinConsumo, datasets: [{ data: [], backgroundColor: '#e74c3c', borderRadius: 4 }] } });
    }

    async function loadData() {
        const selectedDate = document.getElementById('current-date').value;
        if (!selectedDate) return;

        const { data } = await supabase.from('registros').select(`id, Resp_Aud_Digi, asignacion ( id, FechaAuditoriaDigitadores, FechaAuditoriaSinConsumo, CantidadPreAsignacion, ComposicionArmado )`).eq('fecha_creacion', selectedDate);
        
        let fechaAsignadaConsumo = ''; 
        let fechaAsignadaSinConsumo = '';
        const digitadoresActuales = currentTab === 'consumo' ? digitadoresConConsumo : digitadoresSinConsumo;
        const counts = {}; 
        
        let globalComp = '';
        let globalCant = 0;
        
        digitadoresActuales.forEach(d => { counts[d] = 0; });

        if (data) {
            data.forEach(row => {
                const digi = row.Resp_Aud_Digi;
                
                if (row.asignacion && row.asignacion.length > 0) {
                    if (row.asignacion[0].FechaAuditoriaDigitadores) fechaAsignadaConsumo = row.asignacion[0].FechaAuditoriaDigitadores;
                    if (row.asignacion[0].FechaAuditoriaSinConsumo) fechaAsignadaSinConsumo = row.asignacion[0].FechaAuditoriaSinConsumo;
                }

                if (digitadoresActuales.includes(digi)) {
                    counts[digi]++;
                    if (currentTab === 'consumo' && row.asignacion && row.asignacion.length > 0) {
                        if(row.asignacion[0].ComposicionArmado) globalComp = row.asignacion[0].ComposicionArmado;
                        if(row.asignacion[0].CantidadPreAsignacion) globalCant = row.asignacion[0].CantidadPreAsignacion;
                    }
                }
            });
        }

        // Actualizar inputs si el usuario no los está editando
        if (currentTab === 'consumo' && document.activeElement.id !== 'global-comp' && document.activeElement.id !== 'global-cant') {
            document.getElementById('global-comp').value = globalComp;
            document.getElementById('global-cant').value = globalCant;
        }

        if (document.activeElement.id !== 'audit-date-consumo') document.getElementById('audit-date-consumo').value = fechaAsignadaConsumo;
        if (document.activeElement.id !== 'audit-date-sin-consumo') document.getElementById('audit-date-sin-consumo').value = fechaAsignadaSinConsumo;

        // Renderizar Tabla con Checks
        let tableHTML = '';
        digitadoresActuales.forEach(digi => {
            const isChecked = localStorage.getItem(`check_${selectedDate}_${digi}`) === 'true' ? 'checked' : '';
            const rowClass = isChecked ? 'row-checked' : '';
            
            tableHTML += `<tr class="${rowClass}">
                <td class="check-cell"><input type="checkbox" class="digitador-check" onchange="toggleRowCheck(this, '${digi}')" ${isChecked}></td>
                <td><strong>${digi}</strong></td>
                <td style="text-align: center;"><span class="reg-count">${counts[digi]}</span></td>
            </tr>`;
        });

        if(tableHTML === '') tableHTML = `<tr><td colspan="3" style="text-align:center;">No hay digitadores configurados</td></tr>`;

        const chartData = digitadoresActuales.map(d => counts[d]);
        if (currentTab === 'consumo') {
            chartConsumoInstance.data.datasets[0].data = chartData;
            chartConsumoInstance.update();
            document.getElementById('table-consumo').innerHTML = tableHTML;
        } else {
            chartSinConsumoInstance.data.datasets[0].data = chartData;
            chartSinConsumoInstance.update();
            document.getElementById('table-sin-consumo').innerHTML = tableHTML;
        }
    }

    // Función para manejar el Checkbox y pintar la fila
    function toggleRowCheck(checkbox, digi) {
        const tr = checkbox.closest('tr');
        const selectedDate = document.getElementById('current-date').value;
        
        if (checkbox.checked) {
            tr.classList.add('row-checked');
            localStorage.setItem(`check_${selectedDate}_${digi}`, 'true');
        } else {
            tr.classList.remove('row-checked');
            localStorage.removeItem(`check_${selectedDate}_${digi}`);
        }
    }

    // Guardar Composición Global Inmediatamente
    async function saveGlobalComposition() {
        const compValue = document.getElementById('global-comp').value;
        const cantValue = document.getElementById('global-cant').value;
        const selectedDate = document.getElementById('current-date').value;

        const { data: registros } = await supabase.from('registros').select('id').eq('fecha_creacion', selectedDate).in('Resp_Aud_Digi', digitadoresConConsumo);
        
        if (!registros || registros.length === 0) {
            return alert(`No hay registros en la fecha ${selectedDate} para guardar la composición.`);
        }
        
        const registroIds = registros.map(r => r.id);
        const { data: existingAsig } = await supabase.from('asignacion').select('id, registro_id').in('registro_id', registroIds);
        const existingMap = {};
        if (existingAsig) existingAsig.forEach(a => existingMap[a.registro_id] = a.id);

        const upsertData = registroIds.map(rid => {
            const payload = { registro_id: rid, ComposicionArmado: compValue, CantidadPreAsignacion: cantValue || 0 };
            if (existingMap[rid]) payload.id = existingMap[rid]; 
            return payload;
        });

        await supabase.from('asignacion').upsert(upsertData);
        alert(`Composición y Cantidad guardadas correctamente en la base de datos.`);
        loadData(); 
    }

    // Guardar Fecha de Auditoría Específica Inmediatamente
    async function saveAuditDateSpecific(tab) {
        const selectedDate = document.getElementById('current-date').value;
        const inputId = tab === 'consumo' ? 'audit-date-consumo' : 'audit-date-sin-consumo';
        const auditDateValue = document.getElementById(inputId).value;
        const fieldToUpdate = tab === 'consumo' ? 'FechaAuditoriaDigitadores' : 'FechaAuditoriaSinConsumo';
        const digitadoresFiltro = tab === 'consumo' ? digitadoresConConsumo : digitadoresSinConsumo;

        if (!auditDateValue) return alert("Por favor, selecciona una fecha de auditoría primero.");

        const { data: registros } = await supabase.from('registros').select('id').eq('fecha_creacion', selectedDate).in('Resp_Aud_Digi', digitadoresFiltro);
        if (!registros || registros.length === 0) return alert("No hay registros en esta fecha para asignar la auditoría.");

        const registroIds = registros.map(r => r.id);
        const { data: existingAsig } = await supabase.from('asignacion').select('id, registro_id').in('registro_id', registroIds);
        const existingMap = {};
        if (existingAsig) existingAsig.forEach(a => existingMap[a.registro_id] = a.id);

        const upsertData = registroIds.map(rid => {
            const payload = { registro_id: rid, [fieldToUpdate]: auditDateValue };
            if (existingMap[rid]) payload.id = existingMap[rid];
            return payload;
        });

        await supabase.from('asignacion').upsert(upsertData);
        alert(`Fecha de auditoría guardada correctamente.`);
        loadData(); 
    }
</script>
</body>
</html>
